<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Mascotas Huellitas</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: Arial, sans-serif;
    background: #f9f5f0;
    color: #3b2414;
    padding: 20px;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
    margin-bottom: 25px;
}

h1 {
    color: #5c3317;
    font-size: 2rem;
}

nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

nav a {
    background: #5c3317;
    color: white;
    padding: 10px 14px;
    border-radius: 6px;
    text-decoration: none;
}

nav a:hover {
    background: #7a4620;
}

.formulario {
    background: white;
    padding: 20px;
    border-radius: 10px;
    border-left: 5px solid #c9a97a;
    margin-bottom: 20px;
}

.formulario h2 {
    color: #5c3317;
    margin-bottom: 15px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
}

label {
    font-size: 0.9rem;
    font-weight: bold;
    color: #5c3317;
}

input,
select,
textarea {
    width: 100%;
    padding: 9px;
    margin-top: 6px;
    border: 1px solid #c9a97a;
    border-radius: 5px;
    font-family: Arial, sans-serif;
}

textarea {
    resize: vertical;
    min-height: 70px;
}

.actions {
    margin-top: 15px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

button,
.btn {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    font-size: 0.9rem;
}

.btn-primary {
    background: #5c3317;
    color: white;
}

.btn-primary:hover {
    background: #7a4620;
}

.btn-secondary {
    background: #e8d8c4;
    color: #5c3317;
}

.btn-edit {
    background: #c9a97a;
    color: #3b2414;
}

.btn-delete {
    background: #b71c1c;
    color: white;
}

.controls {
    background: white;
    padding: 15px;
    border-left: 5px solid #c9a97a;
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.controls input,
.controls select {
    width: auto;
    min-width: 230px;
    margin-top: 0;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th,
td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: left;
    font-size: 0.9rem;
    vertical-align: top;
}

th {
    background: #5c3317;
    color: white;
}

.estado {
    font-weight: bold;
}

.disponible {
    color: #2e7d32;
}

.en_proceso {
    color: #b26a00;
}

.adoptado {
    color: #b71c1c;
}

.mensaje {
    margin-bottom: 15px;
    font-size: 0.9rem;
    font-weight: bold;
}

.ok {
    color: #2e7d32;
}

.error {
    color: #b71c1c;
}

@media(max-width:900px) {
    body {
        padding: 12px;
    }

    h1 {
        font-size: 1.5rem;
    }

    table {
        font-size: 0.78rem;
    }

    th,
    td {
        padding: 7px;
    }

    .controls input,
    .controls select {
        width: 100%;
    }
}
</style>
</head>

<body>

<header>
    <h1>🐾 Gestión de Mascotas</h1>

<nav>
    <a href="dashboard-admin.html">Inicio</a>
    <a href="mascotas-admin.html">Mascotas</a>
    <a href="solicitudes-admin.html">Solicitudes</a>
    <a href="adoptantes-admin.html">Adoptantes</a>
    <a href="empleados-admin.html">Empleados</a>
    <a href="entrevistas-admin.html">Entrevistas</a>
    <a href="adopciones-admin.html">Adopciones</a>
    <a href="login-empleado.html" onclick="cerrarSesion()">Cerrar sesión</a>
</nav>
</header>

<div id="mensaje" class="mensaje"></div>

<section class="formulario">
    <h2 id="tituloFormulario">Agregar mascota</h2>

    <input type="hidden" id="id_mascota">

    <div class="grid">
        <div>
            <label>Nombre</label>
            <input type="text" id="nombre" placeholder="Ej. Canela">
        </div>

        <div>
            <label>Tipo</label>
            <select id="tipo">
                <option value="">Seleccionar</option>
                <option value="Perro">Perro</option>
                <option value="Gato">Gato</option>
            </select>
        </div>

        <div>
            <label>Edad</label>
            <input type="text" id="edad" placeholder="Ej. 2 años">
        </div>

        <div>
            <label>Sexo</label>
            <select id="sexo">
                <option value="">Seleccionar</option>
                <option value="Macho">Macho</option>
                <option value="Hembra">Hembra</option>
            </select>
        </div>

        <div>
            <label>Raza</label>
            <input type="text" id="raza" placeholder="Ej. Mestiza">
        </div>

        <div>
            <label>Estado</label>
            <select id="estado">
                <option value="disponible">disponible</option>
                <option value="en_proceso">en_proceso</option>
                <option value="adoptado">adoptado</option>
            </select>
        </div>
    </div>

    <div style="margin-top:14px;">
        <label>Descripción</label>
        <textarea id="descripcion" placeholder="Descripción breve de la mascota"></textarea>
    </div>

    <div style="margin-top:14px;">
        <label>Historia</label>
        <textarea id="historia" placeholder="Historia o contexto de rescate"></textarea>
    </div>

    <div class="actions">
        <button class="btn-primary" onclick="guardarMascota()">Guardar mascota</button>
        <button class="btn-secondary" onclick="limpiarFormulario()">Limpiar</button>
    </div>
</section>

<section class="controls">
    <input type="text" id="buscar" placeholder="Buscar por nombre, tipo o raza" onkeyup="filtrarMascotas()">

    <select id="filtroEstado" onchange="filtrarMascotas()">
        <option value="todos">Todos los estados</option>
        <option value="disponible">Disponibles</option>
        <option value="en_proceso">En proceso</option>
        <option value="adoptado">Adoptadas</option>
    </select>

    <button class="btn-primary" onclick="cargarMascotas()">Actualizar</button>
</section>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Tipo</th>
            <th>Edad</th>
            <th>Sexo</th>
            <th>Raza</th>
            <th>Estado</th>
            <th>Descripción</th>
            <th>Historia</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody id="tablaMascotas">
        <tr>
            <td colspan="10">Cargando mascotas...</td>
        </tr>
    </tbody>
</table>

<script src="static-supabase.js"></script>

<script>
const SUPABASE_URL = "modo-estatico-sin-base-de-datos";
const SUPABASE_ANON_KEY = "clave-desactivada-modo-estatico";

const supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

let mascotasGlobal = [];

function protegerAdmin() {
    const logueado = localStorage.getItem("empleado_logueado");
    const rol = localStorage.getItem("rol_empleado");
    const numero = localStorage.getItem("empleado_numero");

    if (
        logueado !== "true" ||
        (
            numero !== "EMP-0042" &&
            rol !== "admin" &&
            rol !== "administrador"
        )
    ) {
        alert("Acceso restringido. Inicia sesión como administrador.");
        window.location.href = "login-empleado.html";
        return false;
    }

    return true;
}

function cerrarSesion() {
    localStorage.clear();
}

function mostrarMensaje(texto, tipo) {
    const msg = document.getElementById("mensaje");
    msg.textContent = texto;
    msg.className = "mensaje " + tipo;

    setTimeout(function() {
        msg.textContent = "";
        msg.className = "mensaje";
    }, 3000);
}

function limpiarTexto(valor) {
    if (valor === null || valor === undefined || valor === "") {
        return "—";
    }

    return String(valor)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function claseEstado(estado) {
    if (!estado) return "";

    return String(estado)
        .toLowerCase()
        .replaceAll(" ", "_");
}

async function cargarMascotas() {
    const tbody = document.getElementById("tablaMascotas");

    tbody.innerHTML = `
        <tr>
            <td colspan="10">Cargando mascotas...</td>
        </tr>
    `;

    const { data, error } = await supabaseClient
        .from("mascotas")
        .select("id_mascota, nombre, tipo, edad, sexo, raza, descripcion, historia, estado")
        .order("id_mascota", { ascending: true });

    if (error) {
        console.error("Error cargando mascotas:", error);
        tbody.innerHTML = `
            <tr>
                <td colspan="10">Error al cargar mascotas.</td>
            </tr>
        `;
        return;
    }

    mascotasGlobal = data || [];
    renderMascotas(mascotasGlobal);
}

function renderMascotas(lista) {
    const tbody = document.getElementById("tablaMascotas");
    tbody.innerHTML = "";

    if (!lista || lista.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="10">No hay mascotas registradas.</td>
            </tr>
        `;
        return;
    }

    lista.forEach(function(m) {
        tbody.innerHTML += `
            <tr>
                <td>${limpiarTexto(m.id_mascota)}</td>
                <td>${limpiarTexto(m.nombre)}</td>
                <td>${limpiarTexto(m.tipo)}</td>
                <td>${limpiarTexto(m.edad)}</td>
                <td>${limpiarTexto(m.sexo)}</td>
                <td>${limpiarTexto(m.raza)}</td>
                <td class="estado ${claseEstado(m.estado)}">${limpiarTexto(m.estado)}</td>
                <td>${limpiarTexto(m.descripcion)}</td>
                <td>${limpiarTexto(m.historia)}</td>
                <td>
                    <button class="btn-edit" onclick="editarMascota(${m.id_mascota})">Editar</button>
                    <button class="btn-delete" onclick="eliminarMascota(${m.id_mascota})">Eliminar</button>
                </td>
            </tr>
        `;
    });
}

function filtrarMascotas() {
    const texto = document.getElementById("buscar").value.toLowerCase();
    const estado = document.getElementById("filtroEstado").value;

    const filtradas = mascotasGlobal.filter(function(m) {
        const coincideTexto =
            String(m.nombre || "").toLowerCase().includes(texto) ||
            String(m.tipo || "").toLowerCase().includes(texto) ||
            String(m.raza || "").toLowerCase().includes(texto);

        const coincideEstado =
            estado === "todos" || m.estado === estado;

        return coincideTexto && coincideEstado;
    });

    renderMascotas(filtradas);
}

async function guardarMascota() {
    const id = document.getElementById("id_mascota").value;

    const mascota = {
        nombre: document.getElementById("nombre").value.trim(),
        tipo: document.getElementById("tipo").value,
        edad: document.getElementById("edad").value.trim(),
        sexo: document.getElementById("sexo").value,
        raza: document.getElementById("raza").value.trim(),
        descripcion: document.getElementById("descripcion").value.trim(),
        historia: document.getElementById("historia").value.trim(),
        estado: document.getElementById("estado").value
    };

    if (!mascota.nombre || !mascota.tipo || !mascota.edad || !mascota.sexo || !mascota.raza || !mascota.estado) {
        mostrarMensaje("Completa nombre, tipo, edad, sexo, raza y estado.", "error");
        return;
    }

    if (id) {
        const { error } = await supabaseClient
            .from("mascotas")
            .update(mascota)
            .eq("id_mascota", id);

        if (error) {
            console.error("Error actualizando mascota:", error);
            mostrarMensaje("No se pudo actualizar la mascota.", "error");
            return;
        }

        mostrarMensaje("Mascota actualizada correctamente.", "ok");
    } else {
        const { error } = await supabaseClient
            .from("mascotas")
            .insert([mascota]);

        if (error) {
            console.error("Error insertando mascota:", error);
            mostrarMensaje("No se pudo agregar la mascota.", "error");
            return;
        }

        mostrarMensaje("Mascota agregada correctamente.", "ok");
    }

    limpiarFormulario();
    cargarMascotas();
}

function editarMascota(id) {
    const mascota = mascotasGlobal.find(function(m) {
        return Number(m.id_mascota) === Number(id);
    });

    if (!mascota) {
        mostrarMensaje("No se encontró la mascota.", "error");
        return;
    }

    document.getElementById("id_mascota").value = mascota.id_mascota;
    document.getElementById("nombre").value = mascota.nombre || "";
    document.getElementById("tipo").value = mascota.tipo || "";
    document.getElementById("edad").value = mascota.edad || "";
    document.getElementById("sexo").value = mascota.sexo || "";
    document.getElementById("raza").value = mascota.raza || "";
    document.getElementById("descripcion").value = mascota.descripcion || "";
    document.getElementById("historia").value = mascota.historia || "";
    document.getElementById("estado").value = mascota.estado || "disponible";

    document.getElementById("tituloFormulario").textContent = "Editar mascota";
    window.scrollTo({ top: 0, behavior: "smooth" });
}

async function eliminarMascota(id) {
    if (!confirm("¿Seguro que quieres eliminar esta mascota? Esta acción no se puede deshacer.")) {
        return;
    }

    const { error } = await supabaseClient
        .from("mascotas")
        .delete()
        .eq("id_mascota", id);

    if (error) {
        console.error("Error eliminando mascota:", error);
        mostrarMensaje("No se pudo eliminar. Puede estar relacionada con protocolos, entrevistas o adopciones.", "error");
        return;
    }

    mostrarMensaje("Mascota eliminada correctamente.", "ok");
    cargarMascotas();
}

function limpiarFormulario() {
    document.getElementById("id_mascota").value = "";
    document.getElementById("nombre").value = "";
    document.getElementById("tipo").value = "";
    document.getElementById("edad").value = "";
    document.getElementById("sexo").value = "";
    document.getElementById("raza").value = "";
    document.getElementById("descripcion").value = "";
    document.getElementById("historia").value = "";
    document.getElementById("estado").value = "disponible";
    document.getElementById("tituloFormulario").textContent = "Agregar mascota";
}

if (protegerAdmin()) {
    cargarMascotas();
}
</script>

</body>
</html>
